name: swiftree_rider
description: "Swiftry Rider - Delivery partner application for managing deliveries across food, groceries, pharmacy, parcel, laundry, errand services."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.14+2
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^14.6.2

  # Network & Storage
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0

  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^10.1.0
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1

  # Media
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
