name: swiftree_vendor
description: "swiftree Vendor Management App - Flutter mobile app for vendors to manage their business on the swiftree platform."

publish_to: 'none' # Private package

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.14+2
  
  # State Management
  flutter_riverpod: ^3.3.2
  
  # Navigation
  go_router: ^14.2.7
  
  # Network & Storage
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0
  shared_preferences: ^2.5.3
  
  # Forms & Validation
  flutter_form_builder: 10.3.0+2
  form_builder_validators: ^11.0.0
  
  # UI Components
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.2
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  
  # Charts & Analytics
  fl_chart: ^0.69.2
  
  # Maps & Location
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.2
  
  # Media & File Handling
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^12.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.25.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/business_types/
    - assets/images/dashboard/
    - assets/icons/
    - assets/icons/navigation/
    - assets/icons/business_types/

  # Fonts - Using Inter like the customer app
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900