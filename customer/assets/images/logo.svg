<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Swift arrow design -->
  <path d="M 150 180 Q 200 140, 280 180 L 280 180 L 360 130 L 380 150 L 300 210 L 380 270 L 360 290 L 280 240 Q 200 280, 150 240 Z" 
        fill="url(#arrowGradient)" 
        stroke="#FFF" 
        stroke-width="4"/>
  
  <!-- Letter S integrated into design -->
  <path d="M 200 320 Q 180 300, 200 280 Q 220 260, 260 270 Q 300 280, 300 310 Q 300 340, 260 350 Q 220 360, 200 340 Q 180 320, 200 300" 
        fill="none" 
        stroke="#FFF" 
        stroke-width="12" 
        stroke-linecap="round"/>
  
  <!-- Speed lines for dynamic effect -->
  <line x1="120" y1="200" x2="80" y2="190" stroke="#FFF" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="110" y1="240" x2="60" y2="240" stroke="#FFF" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="120" y1="280" x2="80" y2="290" stroke="#FFF" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
</svg>
